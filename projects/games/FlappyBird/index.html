<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Neon Flap — Space Bird</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a1a">
    <meta name="format-detection" content="telephone=no">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- Rotate-to-landscape prompt (mobile only, CSS-driven) -->
    <div id="rotate-prompt">
      <div class="rotate-icon">📱</div>
      <div class="rotate-msg">ROTATE YOUR DEVICE</div>
      <div class="rotate-sub">This game plays best in landscape mode</div>
    </div>

    <div id="game-wrapper">
      <!-- HUD -->
      <div id="hud">
        <div id="hud-left">
          <div id="planet-badge">
            <span id="planet-icon-hud">🌍</span>
            <span id="planet-name-hud">Earth</span>
          </div>
        </div>
        <div id="hud-center">
          <div id="score-display">0</div>
        </div>
        <div id="hud-right">
          <div id="best-score-display">BEST: <span id="best-score">0</span></div>
        </div>
      </div>

      <!-- Canvas -->
      <canvas id="gameCanvas"></canvas>

      <!-- Start / Menu Screen -->
      <div id="menu-screen" class="overlay-screen">
        <div class="screen-content glass">
          <h1 class="neon-title">NEON FLAP</h1>
          <p class="subtitle">Choose your gravity</p>
          <div id="planet-selector">
            <button class="planet-btn" data-gravity="0.16" data-name="Moon" data-icon="🌙" data-color="#b0b0d0">
              <span class="planet-emoji">🌙</span>
              <span class="planet-label">Moon</span>
              <span class="planet-g">0.16g</span>
            </button>
            <button class="planet-btn selected" data-gravity="0.5" data-name="Earth" data-icon="🌍" data-color="#00e5ff">
              <span class="planet-emoji">🌍</span>
              <span class="planet-label">Earth</span>
              <span class="planet-g">1.0g</span>
            </button>
            <button class="planet-btn" data-gravity="1.0" data-name="Jupiter" data-icon="🪐" data-color="#ffab40">
              <span class="planet-emoji">🪐</span>
              <span class="planet-label">Jupiter</span>
              <span class="planet-g">2.6g</span>
            </button>
            <button class="planet-btn" data-gravity="3.0" data-name="Sun" data-icon="☀️" data-color="#ff5252">
              <span class="planet-emoji">☀️</span>
              <span class="planet-label">Sun</span>
              <span class="planet-g">27.1g</span>
            </button>
          </div>
          <button id="play-btn" class="glow-btn">
            <span>LAUNCH</span>
          </button>
          <p class="hint-text">Space / Click / Tap to flap</p>
        </div>
      </div>

      <!-- Game Over Screen -->
      <div id="gameover-screen" class="overlay-screen hidden">
        <div class="screen-content glass">
          <h2 class="gameover-title">GAME OVER</h2>
          <div id="final-score-container">
            <div class="final-score-label">SCORE</div>
            <div id="final-score" class="final-score-value">0</div>
          </div>
          <div id="new-best" class="new-best hidden">★ NEW BEST ★</div>
          <div id="final-best-container">
            <span class="final-best-label">BEST:</span>
            <span id="final-best" class="final-best-value">0</span>
          </div>
          <button id="retry-btn" class="glow-btn">
            <span>RETRY</span>
          </button>
          <button id="menu-btn" class="ghost-btn">CHANGE PLANET</button>
        </div>
      </div>

      <!-- Get Ready overlay -->
      <div id="ready-screen" class="overlay-screen hidden">
        <div class="ready-text">GET READY</div>
        <div class="ready-hint">Tap to flap!</div>
      </div>
    </div>

    <!-- Game scripts -->
    <script src="bird.js"></script>
    <script src="pipe.js"></script>
    <script src="game.js"></script>
  </body>
</html>
